<!doctype html>
<html lang="en">
  <head>
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "9d1c4b2e-71ad-4511-8073-646a535603a3",
      safari_web_id: "web.onesignal.auto.44e66786-7e94-4ade-8822-3a1650cda83f",
      notifyButton: {
        enable: true,
      },
    });

    // Hide bell if already subscribed
    const isSubscribed = OneSignal.User.PushSubscription.optedIn;
    if (isSubscribed) {
      OneSignal.notifyButton.hide();
    }

    // Hide bell immediately after subscribing
    OneSignal.User.PushSubscription.addEventListener("change", function(event) {
      if (event.current.optedIn) {
        OneSignal.notifyButton.hide();
      }
    });
  });
</script>
